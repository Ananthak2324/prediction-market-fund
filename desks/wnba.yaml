    "GS": Golden State Valkyries
agent:
  prompt:
    market_description: WNBA basketball game
    disqualifiers:
      - Starting player ruled out TODAY
        announced in last 24 hours
      - Key starter leading scorer or point guard
        scratched TODAY
    not_disqualifiers:
      - Chronic injuries or season-long absences
        already known for 48+ hours
      - Load management for healthy veterans
      - Historical injury mentions
    behavioral_patterns:
      - "HOME_PREMIUM: retail overprices home teams"
      - "STAR_BIAS: popular players drive overpricing"
      - "FAVORITE_LONGSHOT: retail underprices heavy favs"
      - "LOW_ATTENTION: slower Kalshi price updates"
    search_query_template: >
      {home_team} {away_team} WNBA starting lineup
      injury scratch last 24 hours {date}
    search_context: >
      Report starting lineups injuries or
      lineup changes only
  chronic_keywords:
    - season-ending
    - placed on injury report
    - out for season
  new_scratch_keywords:
    - scratch
    - ruled out
    - questionable
    - game-time decision
    - late scratch
