desk_status: ACTIVE
agent:
  model: claude-sonnet-4-6
  max_tokens: 2048
  max_tokens_retry: 1024
  pricing:
    input_per_million: 3.00
    cache_read_per_million: 0.30
    output_per_million: 15.00
    per_search: 0.01
odds_api:
  books: [pinnacle, draftkings, fanduel]
  primary_book: pinnacle
  credit_stop_threshold: 100
thresholds:
  gap_min: 0.05
  tier_a: [0.05, 0.10]
  tier_b: [0.10, 0.15]
  tier_c: [0.15, 1.00]
  large_gap_warn: 0.20
  pinnacle_move_agent_prompt: 0.03
  pinnacle_move_hard_gate: 0.05
  v_prob_min: 0.20
  v_prob_max: 0.80
  favorite_prob_threshold: 0.65
  gap_buckets: [0.03, 0.05, 0.10, 0.15]
  kalshi_mid_range: [0.10, 0.90]
  # classify_edge()'s independent thresholds — consolidated here during the
  # 2026-07-04 rebuild (previously hardcoded inline in edge_discovery_agent.py
  # and never wired to any config file).
  sharp_signal_gap: 0.07
  retail_soft_gap: 0.07
  retail_quiet_gap: 0.03
  behavioral_gap: 0.05
  consensus_min_books: 3
  consensus_min_partial: 2
schedule:
  wide_scan_hours: 2
  snapshot_interval_minutes: 10
  snapshot_window_before: 130
  snapshot_window_after: 110
  edge_discovery_minutes: 30
  outcomes_check_minutes: 15
  gap_curve_poll_minutes: 5
  # Flat fallback — used when hours-before-game can't be determined (e.g. a
  # desk whose Kalshi ticker has no embedded time and no odds-api start_time
  # fallback available at this point in the pipeline). Real cadence for
  # desks with a known game time comes from cooldown_tiers below.
  cooldown_hours: 1
  monitor_cooldown_hours: 1
  # Tiered cooldown (2026-07-17) — replaces the flat 1h cooldown, which was
  # re-researching the same far-out candidate dozens of times before it
  # ever played (confirmed: one MLB game got 44 separate research calls at
  # ~$0.10/call). Games far from start time rarely have anything new to
  # find; games close to start time are exactly when real news (late
  # scratches, lineup changes) actually breaks, so responsiveness there is
  # kept at the original 1h. Applies to both SKIP and MONITOR cooldowns.
  # Checked in order; first tier whose min_hours_before_game the candidate
  # still clears wins.
  cooldown_tiers:
    - min_hours_before_game: 24
      cooldown_hours: 12
    - min_hours_before_game: 6
      cooldown_hours: 4
    - min_hours_before_game: 0
      cooldown_hours: 1
risk:
  sandbox_start_date: "2026-07-05"
  starting_bankroll: 1000.00
  kelly_multiplier: 0.25
  max_position_pct: 0.10
  max_concurrent_positions: 4
  max_drawdown_pause_pct: 0.20
  size_against_current_bankroll: true
  stop_loss_pct: -0.40
  profit_target_pct: 0.80
  near_resolution_hours: 2.0
  near_resolution_min_pnl: 0.10
  max_deployed_warn_pct: 0.30
  max_drawdown_warn_pct: 0.15
signal_gates:
  tiers:
    A:
      status: ACTIVE_FULL
      kelly_multiplier: 0.25
      min_gap: 0.05
      max_gap: 0.10
    B:
      status: ACTIVE_REDUCED
      kelly_multiplier: 0.10
      min_gap: 0.10
      max_gap: 0.15
      upgrade_condition: >
        20 resolved Tier B trades with win rate > 55%
        upgrades to ACTIVE_FULL at kelly 0.25
      downgrade_condition: >
        20 resolved Tier B trades with win rate < 45%
        moves to SHADOW_ONLY
    C:
      status: SHADOW_ONLY
      kelly_multiplier: 0.00
      min_gap: 0.15
      max_gap: 1.00
  active_signals: ["BUY_YES"]
  shadow_signals: ["BUY_NO"]
  buy_no_status: SUSPENDED
  buy_no_note: >
    37.5% WR vs 62.5% for BUY_YES in first 38 trades.
    Investigating chronic injury override interaction
    with BUY_NO signal construction.
pipeline:
  origination_source: edge_discovery_agent
  ingest_disabled: true
  require_pipeline_source_tag: true
